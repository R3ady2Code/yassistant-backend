services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/var/www
    depends_on:
      - postgres
      - redis
    networks:
      - ya

  nginx:
    image: nginx:alpine
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ya

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-ya}
      POSTGRES_USER: ${DB_USERNAME:-ya}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ya

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    networks:
      - ya

  queue-worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan queue:work --tries=3 --timeout=90
    volumes:
      - .:/var/www
    depends_on:
      - app
      - postgres
      - redis
    networks:
      - ya

volumes:
  pgdata:
  redisdata:

networks:
  ya:
    driver: bridge
